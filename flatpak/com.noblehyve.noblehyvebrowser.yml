id: com.noblehyve.noblehyvebrowser
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: noblehyve-browser
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --env=NOBLEHYVE_DEV=0
build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
modules:
  - name: noblehyve-browser
    buildsystem: simple
    build-commands:
      - npm install
      - npx electron-builder --linux dir
      - cp -r dist/linux-unpacked/* /app/
      - install -Dm644 share/metainfo/com.noblehyve.noblehyvebrowser.metainfo.xml
        /app/share/metainfo/com.noblehyve.noblehyvebrowser.metainfo.xml
      - install -Dm644 share/applications/com.noblehyve.noblehyvebrowser.desktop
        /app/share/applications/com.noblehyve.noblehyvebrowser.desktop
      - desktop-file-edit --set-key=Exec --set-value='noblehyve-browser'
        /app/share/applications/com.noblehyve.noblehyvebrowser.desktop
      - for size in 64 128 256 512; do
          install -Dm644 share/icons/hicolor/${size}x${size}/apps/com.noblehyve.noblehyvebrowser.png
          /app/share/icons/hicolor/${size}x${size}/apps/com.noblehyve.noblehyvebrowser.png;
        done
    sources:
      - type: git
        url: https://github.com/mckenziemdt25/noblehyve-browser.git
        tag: v1.0.0
